  const hiddenEl = document.getElementById('pci-seq-'+i);
  const current = hiddenEl ? hiddenEl.value : (state.planComboItems[i]?.name||'');
  const tokens = current.split(/\s*→\s*/).filter(t=>t.trim());
  tokens.splice(bi,1);
  const newSeq = tokens.join(' → ');
  if (hiddenEl) hiddenEl.value = newSeq;
  if (state.planComboItems[i]) state.planComboItems[i].name = newSeq;
  const blocksEl = document.getElementById('pci-blocks-'+i);
  if (blocksEl) {
    blocksEl.innerHTML = tokens.map((t,bj)=>`<div style="display:inline-flex;align-items:center;gap:4px;background:var(--purple-d);color:white;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600">${t}<span onclick="removePciBlock(${i},${bj})" style="cursor:pointer;opacity:.7;font-size:16px;line-height:1">×</span></div>${bj<tokens.length-1?'<span style="color:var(--gold);font-weight:700;align-self:center">→</span>':''}`).join('');
  }
}
// Plan combo sequence autocomplete (typing suggestions)
function onPlanComboInput(i) {
  const inp = document.getElementById('pci-name-'+i);
  if (!inp) return;
  const val = inp.value;
  const sugBox = document.getElementById('pci-sug-'+i);
  if (!sugBox) return;
  if (!val.trim()) { sugBox.innerHTML = ''; return; }
  const lower = val.toLowerCase();
  const allNames = [...new Set([...state.moves.map(m=>m.name), ...state.learning.map(g=>g.name)])];
  const matches = allNames.filter(n => n.toLowerCase().startsWith(lower) && n.toLowerCase() !== lower).slice(0,6);
  if (!matches.length) { sugBox.innerHTML = ''; return; }
  sugBox.innerHTML = matches.map(n =>
    `<div onmousedown="event.preventDefault();(function(){var el=document.getElementById('pci-name-${i}');if(el)el.value='${n.replace(/'/g,"\\'")}';addPciBlock(${i});})();" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)">+ ${n}</div>`
  ).join('');
}

// ─── PLAN ────────────────────────────────────────────────────────────────────

// ─── STATS ──────────────────────────────────────────────────────────────────
function renderStats() {
  const { sessions, moves } = state;
  const poleSessions = sessions.filter(s=>s.sessionType==='pole'||((!s.sessionType)&&(s.moves?.length||s.combos?.length)));
  const offpoleSessions = sessions.filter(s=>s.sessionType==='offpole');
  // Stretching: sessions with stretching flag OR dedicated stretch off-pole sessions
  const stretchSessions = sessions.filter(s=>s.stretching);
  const totalMin = sessions.reduce((a,s)=>a+(parseInt(s.duration)||0),0);
  const avgEnergy = sessions.length ? (sessions.reduce((a,s)=>a+(s.energy||0),0)/sessions.length).toFixed(1) : '—';
  const moodData = sessions.filter(s=>s.moodAfter>=0);
  const avgMood = moodData.length ? (moodData.reduce((a,s)=>a+s.moodAfter,0)/moodData.length) : null;
  const warmupPct = sessions.length ? Math.round(sessions.filter(s=>s.warmup).length/sessions.length*100) : 0;
  const stretchAreaCounts = {};
  stretchSessions.forEach(s=>(s.stretchAreas||[]).forEach(a=>{stretchAreaCounts[a]=(stretchAreaCounts[a]||0)+1;}));

  const byMonth = Array.from({length:6},(_,i)=>{
    const d = new Date(); d.setMonth(d.getMonth()-(5-i));
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return {lbl:d.toLocaleDateString('de-DE',{month:'short'}), year:d.getFullYear(), monthNum:d.getMonth()+1, count:sessions.filter(s=>s.date?.startsWith(key)).length};
  });
  const maxM = Math.max(1,...byMonth.map(d=>d.count));

  const moveCounts = {};
  sessions.forEach(s=>s.moves?.forEach(m=>{if(m.name)moveCounts[m.name]=(moveCounts[m.name]||0)+1;}));
  const topMoves = Object.entries(moveCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return `<div class="scroll">
  <div class="page-header">
    <div class="page-title">Statistiken</div>
    <div class="page-sub">Dein Fortschritt auf einen Blick</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val">${sessions.length}</div><div class="stat-label">Einheiten</div></div>
    <div class="stat-card"><div class="stat-val">${totalMin}</div><div class="stat-label">Total Min</div></div>
    <div class="stat-card"><div class="stat-val">${moves.length}</div><div class="stat-label">💛 Moves</div></div>
    <div class="stat-card"><div class="stat-val">${avgEnergy}⭐</div><div class="stat-label">Ø Energie</div></div>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <div class="stat-card" style="flex:1"><div class="stat-val" style="font-size:20px;background:linear-gradient(var(--gold),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${poleSessions.length}</div><div class="stat-label">🟠 Pole</div></div>
    <div class="stat-card" style="flex:1"><div class="stat-val" style="font-size:20px;color:var(--brown-d)">${offpoleSessions.length}</div><div class="stat-label">🟤 Off-Pole</div></div>
    <div class="stat-card" style="flex:1"><div class="stat-val" style="font-size:20px;color:var(--green)">${stretchSessions.length}</div><div class="stat-label">🧘 Stretch</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-tag">Einheiten pro Monat</div>
      <span style="font-size:11px;color:var(--muted);cursor:pointer" onclick="openCalendar()">Kalender →</span>
    </div>
    <div class="chart-wrap" style="height:90px">
      ${byMonth.map(d=>`<div class="chart-bar-wrap" style="cursor:${d.count>0?'pointer':'default'}" onclick="${d.count>0?`openCalendarMonth('${d.year}','${d.monthNum}')`:''}" title="${d.count>0?d.count+' Einheiten im '+d.lbl:''}">
        <div class="chart-bar" style="height:${(d.count/maxM)*70+(d.count>0?8:0)}px;opacity:${d.count===0?0.2:1}"></div>
        <div class="chart-lbl">${d.lbl}</div>
      </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="section-tag">Gewohnheiten</div>
    <div class="info-row"><span class="info-key">Warm-Up Quote</span><span class="info-val" style="color:${warmupPct>60?'var(--green)':'var(--gold)'}">${warmupPct}%</span></div>
    <div class="info-row"><span class="info-key">Ø Stimmung nachher</span><span class="info-val" style="color:var(--purple);font-size:18px">${avgMood!==null?moods[Math.round(avgMood)]+' '+avgMood.toFixed(1):'—'}</span></div>
  </div>
  ${Object.keys(stretchAreaCounts).length?`<div class="card">
    <div class="section-tag">🧘 Trainierte Bereiche</div>
    ${Object.entries(stretchAreaCounts).sort((a,b)=>b[1]-a[1]).map(([area,count])=>`
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">
      <span style="font-weight:500">${area}</span><span style="color:var(--muted)">${count}×</span>
    </div>
    <div class="prog-bar" style="margin-bottom:8px"><div class="prog-fill" style="width:${(count/Math.max(...Object.values(stretchAreaCounts)))*100}%"></div></div>`).join('')}
  </div>`:''}
  ${topMoves.length>0?`<div class="card">
    <div class="section-tag">Meist trainierte Moves</div>
    ${topMoves.map(([name,count],i)=>`
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">
      <span style="font-weight:500">#${i+1} ${name}</span><span style="color:var(--muted)">${count}×</span>
    </div>
    <div class="prog-bar" style="margin-bottom:10px"><div class="prog-fill" style="width:${(count/topMoves[0][1])*100}%"></div></div>`).join('')}
  </div>`:''}
  ${moves.length>0?`<div class="card">
    <div class="section-tag">💛 Move-Level Verteilung</div>
    ${[1,2,3,4,5].map(d=>{
      const c=moves.filter(m=>m.difficulty===d).length;
      return c>0?`<div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">
        <span style="color:${DIFF_COLORS[d-1]};font-weight:600">Level ${d} – ${levels[d-1]}</span>
        <span style="color:var(--muted)">${c} Moves</span>
      </div>
      <div class="prog-bar" style="margin-bottom:10px"><div class="prog-fill" style="width:${(c/moves.length)*100}%;background:${DIFF_COLORS[d-1]}"></div></div>`:'';
    }).join('')}
  </div>`:''}

  <!-- Backup & Restore -->
  <div class="card" style="margin-top:8px">
    <div class="section-tag">Backup & Restore</div>
    <p style="font-size:13px;color:var(--muted);margin:8px 0 14px">Exportiere alle deine Daten als Backup-Datei oder stelle sie aus einem früheren Backup wieder her.</p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1;font-size:13px" onclick="exportData()">⬇️ Export</button>
      <label class="btn btn-outline" style="flex:1;font-size:13px;text-align:center;cursor:pointer">
        ⬆️ Import
        <input type="file" accept=".json" style="display:none" onchange="importData(event)">
      </label>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center">Tipp: Exportiere regelmäßig auf deinen Mac / iCloud als Sicherheitskopie.</p>
  </div>
</div>`;
}

// ─── SHEET ──────────────────────────────────────────────────────────────────
function renderSheet() {
  if (!state.sheet) return '';
  let content = '';
  if (state.sheet==='session') content = renderSessionSheet();
  else if (state.sheet==='move') content = renderMoveSheet();
  else if (state.sheet==='learngoal') content = renderLearnGoalSheet();
  else if (state.sheet==='comboRep') content = renderComboRepSheet();
  else if (state.sheet==='plan') content = renderPlanSheet();
  return `<div class="overlay" id="sheet-overlay"
    onclick="if(event.target.id==='sheet-overlay')closeSheet()"
    ontouchend="if(event.target.id==='sheet-overlay')closeSheet()">
    <div class="sheet">
      <button onclick="closeSheet()" style="position:absolute;top:12px;right:12px;background:none;border:none;padding:6px;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;z-index:10">✕</button>
      ${content}
    </div>
  </div>`;
}
function closeSheet() { state.sheet = null; render(); }

// ─── BACKUP / RESTORE ────────────────────────────────────────────────────────
function exportData() {
  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    sessions: state.sessions,
    moves: state.moves,
    learning: state.learning,
    plans: state.plans,
    combos: state.combos
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'pole-diary-backup-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.version || (!backup.sessions && !backup.moves && !backup.learning)) {
        alert('Ungültige Backup-Datei. Bitte eine gültige pole-diary-backup.json wählen.');
        return;
      }
      const count = (backup.sessions||[]).length + (backup.moves||[]).length + (backup.learning||[]).length;
      const confirmed = window.confirm(
        'Backup importieren?\n\n' +
        '• ' + (backup.sessions||[]).length + ' Einheiten\n' +
        '• ' + (backup.moves||[]).length + ' Moves\n' +
        '• ' + (backup.learning||[]).length + ' Lernziele\n' +
        '• ' + (backup.plans||[]).length + ' Pläne\n' +
        '• ' + (backup.combos||[]).length + ' Combos & Choreos\n\n' +
        'Deine aktuellen Daten werden überschrieben!'
      );
      if (!confirmed) return;
      if (backup.sessions) { state.sessions = backup.sessions; save(KEYS.sessions, state.sessions); }
      if (backup.moves)    { state.moves    = backup.moves;    save(KEYS.moves, state.moves); }
      if (backup.learning) { state.learning = backup.learning; save(KEYS.learning, state.learning); }
      if (backup.plans)    { state.plans    = backup.plans;    save(KEYS.plans, state.plans); }
      if (backup.combos)   { state.combos   = backup.combos;   save(KEYS.combos, state.combos); }
      render();
      alert('✅ Import erfolgreich! ' + count + ' Einträge wiederhergestellt.');
    } catch(err) {
      alert('Fehler beim Importieren: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── CALENDAR ────────────────────────────────────────────────────────────────
function openCalendar() {
  const now = new Date();
  state.calendarView = {year: now.getFullYear(), month: now.getMonth()+1};
  render();
}
function openCalendarMonth(year, month) {
  state.calendarView = {year: parseInt(year), month: parseInt(month)};
  state.tab = 'stats';
  render();
}

function renderCalendar() {
  const {year, month} = state.calendarView;
  const prevTab = state.tab;

  // Month navigation
  const prevDate = new Date(year, month-2, 1);
  const nextDate = new Date(year, month, 1);
  const now = new Date();
  const isCurrentOrFuture = year > now.getFullYear() || (year === now.getFullYear() && month >= now.getMonth()+1);

  // Build calendar days
  const firstDay = new Date(year, month-1, 1);
  const lastDay = new Date(year, month, 0);
  const daysInMonth = lastDay.getDate();
  // 0=Sun, 1=Mon... we want Mon=0
  let startDow = firstDay.getDay() - 1; if (startDow < 0) startDow = 6;

  // Get all sessions this month
  const key = `${year}-${String(month).padStart(2,'0')}`;
  const monthSessions = state.sessions.filter(s=>s.date?.startsWith(key));
  const sessionsByDay = {};
  monthSessions.forEach(s=>{
    const day = parseInt(s.date.split('-')[2]);
    if (!sessionsByDay[day]) sessionsByDay[day] = [];
    sessionsByDay[day].push(s);
  });

  const monthName = new Date(year, month-1, 1).toLocaleDateString('de-DE',{month:'long', year:'numeric'});
  const dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];

  // Build calendar grid
  const cells = [];
  for (let i=0; i<startDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  // Pad to complete last row
  while (cells.length % 7 !== 0) cells.push(null);

  const todayDay = now.getFullYear()===year && now.getMonth()+1===month ? now.getDate() : -1;

  return `<div class="scroll">
  <div class="detail-header">
    <button class="btn-ghost" onclick="setState({calendarView:null})">${icon('back')}</button>
    <div style="flex:1;text-align:center">
      <div style="font-weight:700;font-size:17px">${monthName}</div>
      <div style="font-size:12px;color:var(--muted)">${monthSessions.length} Einheit${monthSessions.length!==1?'en':''}</div>
    </div>
    <div style="display:flex;gap:4px">
      <button class="btn-ghost" onclick="openCalendarMonth(${prevDate.getFullYear()},${prevDate.getMonth()+1})" style="padding:6px 10px">‹</button>
      ${!isCurrentOrFuture?`<button class="btn-ghost" onclick="openCalendarMonth(${nextDate.getFullYear()},${nextDate.getMonth()+1})" style="padding:6px 10px">›</button>`:'<div style="width:36px"></div>'}
    </div>
  </div>

  <!-- Day headers -->
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
    ${dayNames.map(d=>`<div style="text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:4px 0">${d}</div>`).join('')}
  </div>

  <!-- Calendar grid -->
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px">
    ${cells.map(day=>{
      if (!day) return `<div></div>`;
      const daySessions = sessionsByDay[day]||[];
      const isToday = day===todayDay;
      const hasPole = daySessions.some(s=>s.sessionType==='pole'||(!s.sessionType&&s.moves?.length));
      const hasOffpole = daySessions.some(s=>s.sessionType==='offpole');
      const dotColor = hasPole && hasOffpole ? 'linear-gradient(135deg,var(--gold),var(--pink))' : hasOffpole ? 'linear-gradient(var(--brown),var(--brown-d))' : 'linear-gradient(var(--gold),var(--pink))';
      const bg = isToday ? 'var(--purple-d)' : daySessions.length ? 'var(--card2)' : 'transparent';
      const border = isToday ? '2px solid var(--purple)' : daySessions.length ? '1px solid var(--border)' : '1px solid transparent';
      return `<div onclick="${daySessions.length?`openCalendarDay(${year},${month},${day})`:''}" style="aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;background:${bg};border:${border};cursor:${daySessions.length?'pointer':'default'}">
        <span style="font-size:14px;font-weight:${isToday?'700':'500'};color:${isToday?'white':'var(--text)'}">${day}</span>
        ${daySessions.length?`<div style="width:6px;height:6px;border-radius:50%;background:${dotColor};margin-top:2px"></div>`:''}
      </div>`;
    }).join('')}
  </div>

  <!-- Sessions this month list -->
  ${monthSessions.length>0?`<div class="card">
    <div class="section-tag">Einheiten im ${new Date(year,month-1,1).toLocaleDateString('de-DE',{month:'long'})}</div>
    ${[...monthSessions].sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openDetail(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;color:var(--muted)">${fmtDate(s.date)}</div>
          <div style="font-weight:600;font-size:14px">${(s.focusChips||[]).join(', ')||s.focus||'Freies Training'}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${s.duration?`<span class="pill pill-purple" style="font-size:10px">${s.duration} Min</span>`:''}
          ${s.moves?.length?`<span class="pill pill-pink" style="font-size:10px">⚡${s.moves.length}</span>`:''}
        </div>
      </div>
    </div>`).join('')}
  </div>`:`<div class="card" style="text-align:center;padding:24px;color:var(--muted)">Keine Einheiten in diesem Monat</div>`}
</div>`;
}

function openCalendarDay(year, month, day) {
  // Navigate to sessions tab and show that day's sessions
  const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const daySessions = state.sessions.filter(s=>s.date===dateStr);
  if (daySessions.length===1) {
    openDetail(daySessions[0]);
  } else if (daySessions.length>1) {
    // Show sessions tab filtered — for now open first
    openDetail(daySessions[0]);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
