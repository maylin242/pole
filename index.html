<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pole Diary">
<title>Pole Dance Diary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ee; --card: #ffffff; --card2: #fef3e2; --border: #f0dfc0;
  --purple: #d97706; --purple-d: #b45309; --pink: #ea580c; --pink-d: #c2410c;
  --gold: #f59e0b; --text: #3b1f0a; --muted: #a07850; --green: #16a34a; --red: #dc2626;
  --brown: #92400e; --brown-d: #78350f; --brown-light: #fef3e2;
  --font-d: 'Playfair Display', serif; --font-b: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); margin: 0; padding: 0; }
.app { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
.scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 0 16px 100px; padding-top: max(env(safe-area-inset-top), 16px); -webkit-overflow-scrolling: touch; }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px;
  background: rgba(253,246,238,0.96); backdrop-filter: blur(16px); border-top: 1px solid var(--border);
  display: flex; z-index: 100; padding: 8px 0; padding-bottom: max(env(safe-area-inset-bottom), 8px); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0;
  background: none; border: none; color: var(--muted); cursor: pointer; font-family: var(--font-b); font-size: 10px; font-weight: 500; }
.nav-btn.active { color: var(--purple); }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--purple); opacity: 0; }
.nav-btn.active .nav-dot { opacity: 1; }
.page-header { padding: 24px 0 16px; }
.page-title { font-family: var(--font-d); font-size: 28px; font-weight: 700; }
.page-title span { color: var(--purple); font-style: italic; }
.page-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-accent { border-color: var(--purple-d); background: linear-gradient(135deg, #fff7ed, #fef3e2); }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; }
.stat-val { font-size: 26px; font-weight: 700; color: var(--purple); font-family: var(--font-d); }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.pill-purple { background: #2d1f4e; color: var(--purple); }
.pill-pink { background: #3d1a2e; color: var(--pink); }
.pill-gold { background: #3a2e10; color: var(--gold); }
.pill-offpole { background: #2d1a0e; color: var(--brown); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px;
  border-radius: 12px; font-family: var(--font-b); font-weight: 600; font-size: 14px; cursor: pointer; border: none; width: 100%; }
.btn-primary { background: linear-gradient(135deg, var(--purple-d), var(--pink)); color: white; }
.btn-primary:active { opacity: .85; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-ghost { background: transparent; color: var(--muted); border: none; cursor: pointer; padding: 8px; display: flex; align-items: center; }
.btn-danger { background: #3a1a1a; color: var(--red); border: 1px solid #5a2222; }
.btn-sm { width: auto; padding: 8px 14px; font-size: 13px; }
.fab { position: fixed; bottom: 80px; right: calc(50% - 215px + 16px); width: 52px; height: 52px;
  border-radius: 50%; background: linear-gradient(135deg, var(--purple-d), var(--pink)); color: white;
  border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;
  box-shadow: 0 4px 24px rgba(217,119,6,.35); z-index: 99; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 6px; display: block; }
.input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 14px; color: var(--text); font-family: var(--font-b); font-size: 15px; outline: none; box-sizing: border-box; }
.input:focus { border-color: var(--purple-d); }
textarea.input { resize: vertical; min-height: 70px; }
select.input { -webkit-appearance: none; }
.input-sm { padding: 8px 12px; font-size: 13px; }
.stars { display: flex; gap: 6px; }
.star { font-size: 24px; cursor: pointer; opacity: .3; }
.star.active { opacity: 1; }
.moods { display: flex; gap: 8px; }
.mood-btn { font-size: 26px; cursor: pointer; opacity: .35; border: 2px solid transparent; border-radius: 10px; padding: 4px; }
.mood-btn.active { opacity: 1; border-color: var(--purple-d); background: #fef3e2; }
.move-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--card2); border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
.move-item:active { opacity: .8; }
.move-badge { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--purple-d), var(--pink));
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: 700; color: white; }
.move-name { font-weight: 600; font-size: 14px; }
.move-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
.session-item { padding: 14px; background: var(--card2); border-radius: 14px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
.session-item:active { background: #23233a; border-color: var(--border); }
.session-date { font-size: 12px; color: var(--muted); font-weight: 500; }
.session-title { font-weight: 600; font-size: 15px; margin: 2px 0; }
.session-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.sheet { background: var(--card); border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; position: relative;
  max-height: 92vh; overflow-y: auto; overflow-x: hidden; padding: 16px 16px; padding-bottom: max(env(safe-area-inset-bottom), 24px); box-sizing: border-box;
  animation: slideup .25s cubic-bezier(.2,.8,.4,1); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-family: var(--font-d); font-size: 22px; font-weight: 700; margin-bottom: 16px; }
@keyframes slideup { from { transform: translateY(100%) } to { transform: translateY(0) } }
.prog-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--pink)); }
.goal-item { padding: 12px 14px; background: var(--card2); border-radius: 12px; margin-bottom: 8px; }
.goal-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.goal-name { font-weight: 600; font-size: 14px; }
.goal-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.goal-check.done { background: var(--green); border-color: var(--green); color: #0d0d14; font-size: 12px; }
.tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; }
.tab { flex-shrink: 0; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: var(--font-b); font-size: 12px; font-weight: 600; cursor: pointer; }
.tab.active { background: var(--purple-d); border-color: var(--purple-d); color: white; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.chart-wrap { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-top: 12px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bar { width: 100%; border-radius: 6px 6px 0 0; background: linear-gradient(var(--gold), var(--pink)); min-height: 4px; }
.chart-lbl { font-size: 9px; color: var(--muted); font-weight: 600; }
.empty { text-align: center; padding: 48px 16px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.detail-header { padding: 20px 0 12px; display: flex; align-items: center; gap: 12px; }
.section-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--purple); margin-bottom: 8px; }
.info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; gap: 12px; }
.info-row:last-child { border-bottom: none; }
.info-key { color: var(--muted); flex-shrink: 0; }
.info-val { font-weight: 600; text-align: right; white-space: pre-wrap; word-break: break-word; }
.move-block { background: var(--card2); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.hidden { display: none; }
svg { display: block; }
.sug-box { position:absolute; left:0; right:0; background:var(--card); box-shadow: 0 4px 12px rgba(180,83,9,.15); border:1px solid var(--purple-d); border-top:none; border-radius:0 0 10px 10px; z-index:50; overflow:hidden; }
.sug-box div:hover { background:var(--card2); }
.mv-wrap { position:relative; }
/* Mastery slider */
.mastery-slider-wrap { position:relative; padding:0 4px; }
.mastery-slider { -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:3px; outline:none; cursor:pointer; background: linear-gradient(90deg, var(--gold) 0%, var(--pink) 100%); margin:8px 0 4px; }
.mastery-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:26px; height:26px; border-radius:50%; background:var(--card); border:3px solid var(--gold); box-shadow:0 2px 8px rgba(0,0,0,.2); cursor:pointer; }
.mastery-slider::-moz-range-thumb { width:26px; height:26px; border-radius:50%; background:var(--card); border:3px solid var(--gold); box-shadow:0 2px 8px rgba(0,0,0,.2); cursor:pointer; }
.mastery-label { font-size:13px; color:var(--purple); font-style:italic; margin-top:2px; min-height:18px; text-align:center; font-weight:600; }
.mastery-dots { display:flex; justify-content:space-between; padding:0 4px; margin-top:2px; }
.mastery-dot-lbl { font-size:10px; color:var(--muted); font-weight:600; }
/* Focus multi-select chips */
.focus-chips { display:flex; flex-wrap:wrap; gap:6px; }
.focus-chip { padding:6px 12px; border-radius:99px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:var(--font-b); font-size:12px; font-weight:600; cursor:pointer; }
.focus-chip.active { background:var(--purple-d); border-color:var(--purple-d); color:white; }
/* Drag handles for learning goals */
.drag-handle { cursor:grab; color:var(--muted); padding:4px; font-size:18px; line-height:1; }
.drag-handle:active { cursor:grabbing; }
/* Plan checklist */
.plan-check-item { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.plan-check-item:last-child { border-bottom:none; }
/* Confirm dialog */
.confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:flex; align-items:center; justify-content:center; padding:24px; }
.confirm-box { background:var(--card); border-radius:20px; padding:24px; width:100%; max-width:360px; text-align:center; }
.confirm-title { font-family:var(--font-d); font-size:20px; font-weight:700; margin-bottom:8px; }
.confirm-msg { color:var(--muted); font-size:14px; margin-bottom:20px; }
.confirm-btns { display:flex; gap:10px; }
/* Link edit inline */
.link-edit-row { background:var(--card2); border-radius:10px; padding:10px; margin-bottom:6px; }
/* Move detail sheet */
.move-detail-stat { text-align:center; flex:1; }
.move-detail-stat-val { font-size:22px; font-weight:700; color:var(--purple); font-family:var(--font-d); }
.move-detail-stat-lbl { font-size:10px; color:var(--muted); font-weight:500; text-transform:uppercase; }
/* Off-pole type badges */
.type-badge-pole { background:#fff7ed; color:var(--purple-d); border:1px solid var(--purple-d); border-radius:6px; font-size:10px; font-weight:700; padding:2px 7px; display:inline-block; }
.type-badge-offpole { background:#fef3e2; color:var(--brown-d); border:1px solid var(--brown); border-radius:6px; font-size:10px; font-weight:700; padding:2px 7px; display:inline-block; }
/* Stretch area chips */
.area-chip { padding:5px 10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; }
.area-chip.active { background:var(--brown-d); border-color:var(--brown); color:white; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- pages injected by JS -->
</div>

<script>
// ─── STORAGE ────────────────────────────────────────────────────────────────
const KEYS = { sessions:'pd_sessions', moves:'pd_moves', combos:'pd_combos', learning:'pd_learning', plans:'pd_plans' };
function load(k) { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } }
function save(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const MASTERY_LABELS = ['', 'Kennengelernt', 'In Arbeit', 'Eine Seite', 'Beide Seiten', 'Gemeistert'];
const MASTERY_LABELS_CHOREO = ['', 'Kennengelernt', 'In Arbeit', 'Größtenteils', 'Fast perfekt', 'Sicher & sauber'];
const FOCUS_OPTIONS = ['Neue Tricks','Technik & Üben','Combos & Flow','Choreografie','Kraft & Conditioning','Flexibilität','Spins','Inverts','Floorwork','Freestyle'];
const STRETCH_AREAS = ['Front Splits','Middle Splits','Schultern','Rücken','Hüfte'];

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  tab: 'home',
  sessions: load(KEYS.sessions),
  moves: load(KEYS.moves),
  learning: load(KEYS.learning),
  plans: load(KEYS.plans),
  combos: load(KEYS.combos),
  detail: null,
  sheet: null,
  form: {},
  sessionMoves: [],
  sessionCombos: [],
  moveTab: 'all',
  moveSearch: '',
  learnSearch: '',
  learnTypeFilter: 'all',
  movesSection: 'moves',
  moveDetail: null,
  moveDetailFull: null,
  comboDetailFull: null,
  learnDetail: null,
  learnDetailFromMoves: null,
  calendarView: null, // {year, month} when showing calendar
  confirmAction: null,
  editingSession: null,
};

function setState(patch) { Object.assign(state, patch); render(); }

// ─── HELPERS ────────────────────────────────────────────────────────────────
const today = () => new Date().toISOString().split('T')[0];
const fmtDate = d => d ? new Date(d+'T00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const moods = ['😩','😕','😐','😊','😄'];
const levels = ['Kennengelernt','In Arbeit','Eine Seite','Beide Seiten','Gemeistert'];
const DIFF_COLORS = ['#4ade80','#a3e635','#fbbf24','#fb923c','#f87171'];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

function icon(name, size=20) {
  const paths = {
    home: ['M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z','M9 22V12h6v10'],
    plus: ['M12 5v14','M5 12h14'],
    star: ['M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'],
    check: ['M20 6L9 17l-5-5'],
    x: ['M18 6L6 18','M6 6l12 12'],
    trash: ['M3 6h18','M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6','M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2'],
    chart: ['M18 20V10','M12 20V4','M6 20v-6'],
    target: ['M22 12h-4','M2 12h4','M12 22v-4','M12 2v4','M6.34 17.66l-2.83 2.83','M19.07 4.93l-2.83 2.83','M17.66 17.66l2.83 2.83','M4.93 4.93l2.83 2.83'],
    back: ['M19 12H5','M12 5l-7 7 7 7'],
    clock: ['M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2','M12 6v6l4 2'],
    zap: ['M13 2L3 14h9l-1 8 10-12h-9l1-8z'],
    book: ['M4 19.5A2.5 2.5 0 0 1 6.5 17H20','M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'],
    plan: ['M8 6h13','M8 12h13','M8 18h13','M3 6h.01','M3 12h.01','M3 18h.01'],
    edit: ['M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7','M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z'],
    grip: ['M9 5h1','M9 12h1','M9 19h1','M14 5h1','M14 12h1','M14 19h1'],
    info: ['M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2','M12 16v-4','M12 8h.01'],
    link: ['M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71','M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71'],
  };
  const ps = (paths[name]||[]).map(d=>`<path d="${d}"/>`).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ps}</svg>`;
}

function stars(val, field) {
  return [1,2,3,4,5].map(i=>`<span class="star ${i<=val?'active':''}" onclick="setFormField('${field}',${i})" style="font-size:24px;cursor:pointer">⭐</span>`).join('');
}
function moodPicker(val, field, small=false) {
  return moods.map((m,i)=>`<span class="mood-btn ${val===i?'active':''}" data-mood-field="${field}" onclick="setFormField('${field}',${i})" style="${small?'font-size:20px;padding:3px':''}">${m}</span>`).join('');
}

let _masterySliderCounter = 0;

// ─── DOM VALUE COLLECTOR (called before every render that happens inside the session sheet) ───
function collectSheetValues() {
  if (!state.sheet) return;
  // Move name/fields
  state.sessionMoves.forEach((m,i) => {
    m.name = document.getElementById(`mv-name-${i}`)?.value ?? m.name;
    m.sides = document.getElementById(`mv-sides-${i}`)?.value ?? m.sides;
    m.hold = document.getElementById(`mv-hold-${i}`)?.value ?? m.hold;
    m.attL = document.getElementById(`mv-attL-${i}`)?.value ?? m.attL;
    m.attR = document.getElementById(`mv-attR-${i}`)?.value ?? m.attR;
    m.sucL = document.getElementById(`mv-sucL-${i}`)?.value ?? m.sucL;
    m.sucR = document.getElementById(`mv-sucR-${i}`)?.value ?? m.sucR;
    m.notes = document.getElementById(`mv-notes-${i}`)?.value ?? m.notes;
  });
  state.sessionCombos.forEach((c,i) => {
    c.sequence = document.getElementById(`cb-seq-${i}`)?.value ?? c.sequence;
    c.choreoName = document.getElementById(`cb-choreo-${i}`)?.value ?? c.choreoName;
    c.song = document.getElementById(`cb-song-${i}`)?.value ?? c.song;
    c.notes = document.getElementById(`cb-notes-${i}`)?.value ?? c.notes;
    c.attL = document.getElementById(`cb-attL-${i}`)?.value ?? c.attL;
    c.attR = document.getElementById(`cb-attR-${i}`)?.value ?? c.attR;
    c.attTotal = document.getElementById(`cb-attTotal-${i}`)?.value ?? c.attTotal;
  });
  ['warmupNotes','stretchingNotes','conditioningNotes','cooldownNotes','win','improve','highlight','freestyleSong','focusCustom'].forEach(k => {
    const el = document.getElementById('form-'+k);
    if (el) state.form[k] = el.value;
  });
  const startEl = document.getElementById('form-startTime');
  const endEl = document.getElementById('form-endTime');
  if (startEl) state.form.startTime = startEl.value;
  if (endEl) state.form.endTime = endEl.value;
  // Mastery sliders - read directly from inputs
  document.querySelectorAll('[data-mastery-move]').forEach(el => {
    const i = parseInt(el.dataset.masteryMove);
    if (!isNaN(i) && state.sessionMoves[i]) state.sessionMoves[i].mastery = parseInt(el.value)||0;
  });
  document.querySelectorAll('[data-mastery-combo]').forEach(el => {
    const i = parseInt(el.dataset.masteryCombo);
    if (!isNaN(i) && state.sessionCombos[i]) state.sessionCombos[i].mastery = parseInt(el.value)||0;
  });
  const formMastery = document.querySelector('[data-mastery-form]');
  if (formMastery) state.form[formMastery.dataset.masteryForm] = parseInt(formMastery.value)||0;
}

// ─── MASTERY SLIDER (no render() call — updates DOM only) ─────────────────
function masterySlider(val, updateFn, isChoreo=false, dataAttr='') {
  const lblArr = isChoreo ? MASTERY_LABELS_CHOREO : MASTERY_LABELS;
  const allLabels = ['Nicht eingestellt', ...lblArr.slice(1)];
  const safeId = 'ms_' + (++_masterySliderCounter);
  const pct = (val||0)/5*100;
  const lbl = allLabels[val||0] || 'Nicht eingestellt';
  return `<div class="mastery-slider-wrap">
    <input type="range" id="${safeId}_input" class="mastery-slider" min="0" max="5" step="1" value="${val||0}"
      ${dataAttr}
      oninput="(function(sl,v){
        var lbl=['Nicht eingestellt',${allLabels.slice(1).map(l=>`'${l}'`).join(',')}];
        var el=document.getElementById('${safeId}');
        if(el)el.textContent=lbl[v]||'Nicht eingestellt';
        sl.style.background='linear-gradient(90deg,var(--gold) '+(v/5*100)+'%,var(--border) '+(v/5*100)+'%)';
        ${updateFn};
      })(this,parseInt(this.value))"
      style="background:linear-gradient(90deg,var(--gold) ${pct}%,var(--border) ${pct}%)">
    <div class="mastery-label" id="${safeId}">${lbl}</div>
    <div class="mastery-dots">
      <span class="mastery-dot-lbl">—</span><span class="mastery-dot-lbl">1</span><span class="mastery-dot-lbl">2</span><span class="mastery-dot-lbl">3</span><span class="mastery-dot-lbl">4</span><span class="mastery-dot-lbl">5</span>
    </div>
  </div>`;
}

// No-render versions of mastery update (called from slider oninput)
function updateMasteryGoalNoRender(id, val) {
  const prev = (state.learning.find(g=>g.id===id)||{}).mastery||0;
  state.learning = state.learning.map(g=>g.id===id?{...g,mastery:val,regressed:(prev>=5&&val<5)?true:(val>=5?false:g.regressed)}:g);
  save(KEYS.learning, state.learning);
  // sync to moves
  const goal = state.learning.find(g=>g.id===id);
  if (goal) {
    state.moves = state.moves.map(m=>m.name.toLowerCase()===goal.name.toLowerCase()?{...m,difficulty:val}:m);
    save(KEYS.moves, state.moves);
  }
  if (val>=5 && goal && goal.learnType==='move' && !state.moves.find(m=>m.name.toLowerCase()===goal.name.toLowerCase())) {
    state.moves.push({id:uid(), name:goal.name, learnedOn:today(), difficulty:5, notes:goal.notes||'', bothSides:true, fromLearning:true});
    save(KEYS.moves, state.moves);
  }
}
function updateMoveDifficultyNoRender(id, val) {
  state.moves = state.moves.map(m=>m.id===id?{...m,difficulty:val}:m);
  save(KEYS.moves, state.moves);
  const move = state.moves.find(m=>m.id===id);
  if (move) syncMasteryToLearning(move.name, val, false);
}

// ─── TIME / DURATION HELPERS ─────────────────────────────────────────────────
function calcDurationDisplay(start, end) {
  if (!start || !end) return '';
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins < 0) mins += 24 * 60; // overnight
  if (mins <= 0) return '';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h} Std ${m > 0 ? m + ' Min' : ''}`.trim() : `${m} Min`;
}

function calcDuration() {
  const start = document.getElementById('form-startTime')?.value;
  const end = document.getElementById('form-endTime')?.value;
  const el = document.getElementById('duration-display');
  if (!el) return;
  if (start && end) {
    const txt = calcDurationDisplay(start, end);
    el.textContent = txt ? '⏱ ' + txt : '';
    // Store duration in minutes on form
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    let mins = (eh * 60 + em) - (sh * 60 + sm);
    if (mins < 0) mins += 24 * 60;
    state.form.duration = mins > 0 ? mins : '';
  } else {
    el.textContent = '';
  }
}

      const stars = document.querySelectorAll('.star');

// Autocomplete for conditioning/stretching/warmup/cooldown notes
function onNotesInput(fieldKey, el) {
  state.form[fieldKey] = el.value;
  const val = el.value.trim();
  const sugBox = document.getElementById('notes-sug-'+fieldKey);
  if (!sugBox) return;
  if (!val || val.length < 2) { sugBox.innerHTML=''; return; }
  // Collect previous notes for this field from past sessions
  const lower = val.toLowerCase();
  const seen = new Set();
  const matches = [];
  state.sessions.forEach(s => {
    const note = s[fieldKey];
    if (note && note.trim() && note.toLowerCase().includes(lower) && note.trim()!==val) {
      const trimmed = note.trim();
      if (!seen.has(trimmed)) { seen.add(trimmed); matches.push(trimmed); }
    }
  });
  if (!matches.length) { sugBox.innerHTML=''; return; }
  sugBox.innerHTML = matches.slice(0,4).map(n=>
    `<div onmousedown="event.preventDefault();(function(){var el=document.getElementById('form-${fieldKey}');if(el){el.value='${n.replace(/'/g,"\\'").replace(/\n/g,' ')}';state.form['${fieldKey}']=el.value;}document.getElementById('notes-sug-${fieldKey}').innerHTML='';})();" style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n.replace(/\n/g,' ').slice(0,60)}</div>`
  ).join('');
}

  render();
  requestAnimationFrame(()=>{ const s=document.querySelector('.sheet'); if(s) s.scrollTop=scrollY; });
}

function setSessionMoveMastery(i, val) {
  // called from legacy path — just update state, no render
  state.sessionMoves[i].mastery = val;
  const moveName = state.sessionMoves[i].name || document.getElementById('mv-name-'+i)?.value || '';
  if (moveName) syncMasteryToLearning(moveName, val, false);
}
function setSessionComboMastery(i, val) {
  state.sessionCombos[i].mastery = val;
  const name = state.sessionCombos[i].choreoName || state.sessionCombos[i].sequence ||
    document.getElementById(`cb-choreo-${i}`)?.value || document.getElementById(`cb-seq-${i}`)?.value || '';
  if (name) syncMasteryToLearning(name, val, state.sessionCombos[i].type==='choreo');
}
function syncMasteryToLearning(name, mastery, isChoreo) {
  if (!name || !name.trim()) return;
  const lower = name.trim().toLowerCase();
  // Update learning goal
  const goal = state.learning.find(g => g.name.toLowerCase() === lower);
  if (goal) {
    goal.mastery = mastery;
    save(KEYS.learning, state.learning);
  }
  // Also update moves repertoire difficulty (mastery maps to difficulty 1-5)
  if (!isChoreo) {
    const move = state.moves.find(m => m.name.toLowerCase() === lower);
    if (move) {
      move.difficulty = mastery;
      save(KEYS.moves, state.moves);
    }
  }
}

// ─── MOVE SUGGESTIONS ────────────────────────────────────────────────────────
function pickMoveSuggestion(i, name) {
  state.sessionMoves[i].name = name;
  const inp = document.getElementById('mv-name-'+i);
  if (inp) inp.value = name;
  const sugBox = document.getElementById('mv-sug-'+i);
  if (sugBox) sugBox.innerHTML = '';
  // Update tutorial links immediately
  const linksEl = document.getElementById('mv-links-'+i);
  if (linksEl) linksEl.innerHTML = renderTutorialLinks(name);
  // pre-fill mastery from learning goal — update slider without re-rendering
  const goal = state.learning.find(g => g.name.toLowerCase() === name.toLowerCase());
  if (goal && goal.mastery) {
    state.sessionMoves[i].mastery = goal.mastery;
    // Find the mastery slider for this move and update it
    const sliderEl = document.querySelector(`[data-mastery-move="${i}"]`);
    if (sliderEl) {
      sliderEl.value = goal.mastery;
      sliderEl.dispatchEvent(new Event('input'));
    }
  }
}
function onMoveInput(i) {
  const val = document.getElementById('mv-name-'+i)?.value || '';
  state.sessionMoves[i].name = val;
  // Update tutorial links block directly in DOM
  const linksEl = document.getElementById('mv-links-'+i);
  if (linksEl) linksEl.innerHTML = renderTutorialLinks(val);
  // Autocomplete suggestions
  const sugBox = document.getElementById('mv-sug-'+i);
  if (!sugBox) return;
  if (!val.trim()) { sugBox.innerHTML = ''; return; }
  const lower = val.toLowerCase();
  const allNames = [...state.moves.map(m=>m.name), ...state.learning.map(g=>g.name)];
  const unique = [...new Set(allNames)];
  const matches = unique.filter(n => n.toLowerCase().includes(lower) && n.toLowerCase() !== lower).slice(0,5);
  if (!matches.length) { sugBox.innerHTML = ''; return; }
  sugBox.innerHTML = matches.map(n =>
    `<div onclick="pickMoveSuggestion(${i},'${n.replace(/'/g,"\\'")}')" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)" onmousedown="event.preventDefault()">${n}</div>`
  ).join('');
}
function hideSuggestions(i) { setTimeout(()=>{ const b=document.getElementById('mv-sug-'+i); if(b) b.innerHTML=''; },200); }

// Add a move block to the combo sequence
function addCbBlock(i) {
  const inp = document.getElementById('cb-seq-input-'+i);
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) return;
  // Get current sequence and append
  const hiddenEl = document.getElementById('cb-seq-'+i);
  const current = hiddenEl ? hiddenEl.value : (state.sessionCombos[i]?.sequence||'');
  const tokens = current.split(/\s*→\s*/).filter(t=>t.trim());
  tokens.push(name);
  const newSeq = tokens.join(' → ');
  if (hiddenEl) hiddenEl.value = newSeq;
  if (state.sessionCombos[i]) state.sessionCombos[i].sequence = newSeq;
  inp.value = '';
  // Auto-add to learning if unknown
  autoAddToLearning(name);
  // Re-render the blocks display
  const blocksEl = document.getElementById('cb-blocks-'+i);
  if (blocksEl) {
    blocksEl.innerHTML = tokens.map((t,bi)=>`<div style="display:inline-flex;align-items:center;gap:4px;background:var(--purple-d);color:white;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600">${t}<span onclick="removeCbBlock(${i},${bi})" style="cursor:pointer;opacity:.7;font-size:16px;line-height:1">×</span></div>${bi<tokens.length-1?'<span style="color:var(--gold);font-weight:700;align-self:center">→</span>':''}`).join('');
  }
  // Clear suggestions
  const sug = document.getElementById('cb-sug-'+i);
  if (sug) sug.innerHTML = '';
  inp.focus();
}
function removeCbBlock(i, bi) {
  const hiddenEl = document.getElementById('cb-seq-'+i);
  const current = hiddenEl ? hiddenEl.value : (state.sessionCombos[i]?.sequence||'');
  const tokens = current.split(/\s*→\s*/).filter(t=>t.trim());
  tokens.splice(bi, 1);
  const newSeq = tokens.join(' → ');
  if (hiddenEl) hiddenEl.value = newSeq;
  if (state.sessionCombos[i]) state.sessionCombos[i].sequence = newSeq;
  const blocksEl = document.getElementById('cb-blocks-'+i);
  if (blocksEl) {
    blocksEl.innerHTML = tokens.map((t,bj)=>`<div style="display:inline-flex;align-items:center;gap:4px;background:var(--purple-d);color:white;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600">${t}<span onclick="removeCbBlock(${i},${bj})" style="cursor:pointer;opacity:.7;font-size:16px;line-height:1">×</span></div>${bj<tokens.length-1?'<span style="color:var(--gold);font-weight:700;align-self:center">→</span>':''}`).join('');
  }
}
// Combo sequence autocomplete (typing suggestions)
function onComboSeqInput(i) {
  const inp = document.getElementById('cb-seq-input-'+i);
  if (!inp) return;
  const val = inp.value;
  const sugBox = document.getElementById('cb-sug-'+i);
  if (!sugBox) return;

  const lower = val.toLowerCase();
  const allNames = [...new Set([...state.moves.map(m=>m.name), ...state.learning.map(g=>g.name)])];

  ).join('');
}

// ─── SESSIONS ───────────────────────────────────────────────────────────────
function isOffPoleSession(moves, combos, form) {
  const hasMoves = (moves||[]).some(m=>m.name&&m.name.trim());
  const hasCombos = (combos||[]).some(c=>(c.sequence||c.choreoName||'').trim());
  return !hasMoves && !hasCombos && (form.stretching || form.conditioning);
}

    conditioning:false,conditioningNotes:'',freestyle:false,freestyleType:'spin',freestyleHeels:false,freestyleSong:'',
    cooldown:false,cooldownNotes:'',moodBefore:2,moodAfter:3,win:'',improve:'',highlight:'',
    tutorials:[]};
  state.sessionMoves = [{name:'',sides:'both',hold:'',attL:'',attR:'',notes:'',mastery:0}];

    warmup: s.warmup||false, warmupNotes: s.warmupNotes||'',

function collectSessionFormValues() {
  state.sessionMoves.forEach((m,i) => {
    m.name = document.getElementById(`mv-name-${i}`)?.value || m.name;
    m.sides = document.getElementById(`mv-sides-${i}`)?.value || m.sides;
    m.hold = document.getElementById(`mv-hold-${i}`)?.value || m.hold;
    m.attL = document.getElementById(`mv-attL-${i}`)?.value || m.attL;
    m.attR = document.getElementById(`mv-attR-${i}`)?.value || m.attR;
    m.sucL = document.getElementById(`mv-sucL-${i}`)?.value || m.sucL;
    m.sucR = document.getElementById(`mv-sucR-${i}`)?.value || m.sucR;
    m.notes = document.getElementById(`mv-notes-${i}`)?.value || m.notes;
  });
  state.sessionCombos.forEach((c,i) => {
    c.sequence = document.getElementById(`cb-seq-${i}`)?.value || c.sequence;
    c.choreoName = document.getElementById(`cb-choreo-${i}`)?.value || c.choreoName;
    c.song = document.getElementById(`cb-song-${i}`)?.value || c.song;
    c.notes = document.getElementById(`cb-notes-${i}`)?.value || c.notes;
    c.attL = document.getElementById(`cb-attL-${i}`)?.value || c.attL;
    c.attR = document.getElementById(`cb-attR-${i}`)?.value || c.attR;
    c.attTotal = document.getElementById(`cb-attTotal-${i}`)?.value || c.attTotal;
  });
  const startEl = document.getElementById('form-startTime');
  const endEl = document.getElementById('form-endTime');
  if (startEl) state.form.startTime = startEl.value;
  if (endEl) state.form.endTime = endEl.value;
  if (startEl?.value && endEl?.value) {
    const [sh, sm] = startEl.value.split(':').map(Number);
    const [eh, em] = endEl.value.split(':').map(Number);
    let mins = (eh * 60 + em) - (sh * 60 + sm);
    if (mins < 0) mins += 24 * 60;
    state.form.duration = mins > 0 ? mins : '';
  }
  ['warmupNotes','stretchingNotes','conditioningNotes','cooldownNotes','win','improve','highlight','freestyleSong','focusCustom'].forEach(k => {
    const el = document.getElementById('form-'+k);
    if (el) state.form[k] = el.value;
  });
  // collect checked tutorials
  const checkedTuts = [];
  document.querySelectorAll('.session-tut-check:checked').forEach(cb => checkedTuts.push(cb.value));
  if (checkedTuts.length > 0) state.form.tutorials = checkedTuts;
}

function saveSession() {
  collectSessionFormValues();
  const moves = state.sessionMoves.filter(m=>m.name.trim());
  const combos = state.sessionCombos.filter(c=>c.sequence.trim()||c.choreoName.trim());
  // auto-detect off-pole
  const sessionType = isOffPoleSession(moves, combos, state.form) ? 'offpole' : 'pole';
  const s = {...state.form, sessionType, moves, combos};

  if (state.editingSession) {
    s.id = state.editingSession;
    state.sessions = state.sessions.map(x => x.id === s.id ? s : x);
  } else {
    s.id = uid();
    state.sessions = [s, ...state.sessions];
  }
  save(KEYS.sessions, state.sessions);

  // auto-add new moves to repertoire + sync mastery
  moves.forEach(m => {
    if (!m.name.trim()) return;
    const existing = state.moves.find(x=>x.name.toLowerCase()===m.name.toLowerCase());
    if (!existing) {
      state.moves.push({id:uid(), name:m.name, learnedOn:s.date, difficulty:m.mastery||1, notes:'', bothSides: m.sides==='both'});
      save(KEYS.moves, state.moves);
    }
    if (m.mastery) syncMasteryToLearning(m.name, m.mastery, false);
  });

  // sync combo/choreo mastery to learning goals
  combos.forEach(c => {
    const name = c.type==='choreo' ? c.choreoName : c.sequence;
    if (name && name.trim() && c.mastery) syncMasteryToLearning(name, c.mastery, c.type==='choreo');
  });

  state.sheet = null;
  state.editingSession = null;
  render();
}

    state.detail = null;

function _getResources() {

  state.plans = state.plans.map(p => p.id===id ? {...p, done:!p.done} : p);
  save(KEYS.plans, state.plans);
  if (!wasDone) {

    const items = (plan.planItems||[]).filter(i=>i.name&&i.name.trim());
    const comboItems = (plan.planComboItems||[]).filter(i=>i.name&&i.name.trim());
    const moves = items.map(item=>({name:item.name,sides:'both',hold:'',attL:'',attR:'',notes:'',mastery:item.mastery||getMasteryForName(item.name,false)||0}));

    const sessionType = (moves.length===0&&combos.length===0)?'offpole':'pole';

    state.sessions = [newSession, ...state.sessions];

  } else {
    // Undoing done → remove auto-created session that came from this plan
    const before = state.sessions.length;
    state.sessions = state.sessions.filter(s=>s.fromPlan!==id);
    if (state.sessions.length !== before) save(KEYS.sessions, state.sessions);

// ─── SWIPE TO DELETE ─────────────────────────────────────────────────────────
function setupSwipe() {
  document.querySelectorAll('[data-swipe-delete]').forEach(el => {
    if (el._swipeSetup) return;
    el._swipeSetup = true;
    let startX = 0, dx = 0, swiping = false;
    const threshold = 80;
    el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dx = 0; swiping = true; }, {passive:true});
    el.addEventListener('touchmove', e => {
      if (!swiping) return;
      dx = e.touches[0].clientX - startX;
      if (dx < 0) {
        el.style.transform = `translateX(${Math.max(dx,-120)}px)`;
        el.style.transition = 'none';
      }
    }, {passive:true});
    el.addEventListener('touchend', () => {
      swiping = false;
      if (dx < -threshold) {
        el.style.transform = 'translateX(-120px)';
        el.style.transition = 'transform .2s';
        // show delete reveal already appended
      } else {
        el.style.transform = '';
        el.style.transition = 'transform .25s';
      }
    });
  });
}

  _masterySliderCounter = 0;
  // Sync DOM → state before re-render
  if (state.sheet === 'session') {
    collectSheetValues();
  } else if (state.sheet === 'learngoal') {
    const resEl = document.getElementById('res-data');
    if (resEl && !state._freshLearnForm) { try { state.form.resources = JSON.parse(resEl.value)||[]; } catch{} }
    const lgName = document.getElementById('lg-name');
    const lgNotes = document.getElementById('lg-notes');
    // lg-name is either a text input (move/choreo) or hidden input (combo block builder)
    if (lgName && lgName.value !== undefined) state.form.name = lgName.value;
    if (lgNotes && lgNotes.value !== undefined) state.form.notes = lgNotes.value;
  } else if (state.sheet === 'comboRep') {
    // Sync hidden cr-name (combo sequence) back to state.form.name
    const crName = document.getElementById('cr-name');
    if (crName) state.form.name = crName.value;
    const crNotes = document.getElementById('cr-notes');
    if (crNotes) state.form.notes = crNotes.value;
  }
  state._freshLearnForm = false;
  const app = document.getElementById('app');
  if (app) { app.innerHTML = renderApp(); setTimeout(setupSwipe, 0); }
}

// ─── MOVES PAGE ──────────────────────────────────────────────────────────────
function getAllMoveItems() {
  // Merge moves repertoire + learning goals (avoiding duplicates)
  const items = [...state.moves.map(m=>({...m, _source:'rep'}))];
  state.learning.filter(g=>g.learnType==='move').forEach(g => {
    if (!items.find(m=>m.name.toLowerCase()===g.name.toLowerCase())) {
      items.push({id:g.id, name:g.name, learnedOn:null, difficulty:g.mastery||0, notes:g.notes||'', bothSides:null, _source:'learn', _goalId:g.id});
    } else {
      // update difficulty from mastery if learning goal has higher info
      const existing = items.find(m=>m.name.toLowerCase()===g.name.toLowerCase());
      if (g.mastery && !existing.difficulty) existing.difficulty = g.mastery;
    }
  });
  return items;
}

function renderMoves() {
  const { moveTab, moveSearch, movesSection, combos } = state;
  if (movesSection === 'combos') return renderCombosRepertoire();
  const allItems = getAllMoveItems();
  const filtered = allItems.filter(m => {
    const ok = m.name.toLowerCase().includes(moveSearch.toLowerCase());
    return moveTab==='all' ? ok : ok && m.difficulty===parseInt(moveTab);
  }).sort((a,b) => a.name.localeCompare(b.name, 'de'));
  const byDiff = d => allItems.filter(m=>m.difficulty===d).length;
  const totalMoves = allItems.length;
  return `<div class="scroll">
  <div class="page-header">
    <div class="page-title">💛 Move-<span>Repertoire</span></div>
    <div class="page-sub">${totalMoves} Moves · ${(combos||[]).length} Combos</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="tab ${movesSection==='moves'?'active':''}" style="flex:1" onclick="setState({movesSection:'moves'})">💛 Moves</button>
    <button class="tab ${movesSection==='combos'?'active':''}" style="flex:1" onclick="setState({movesSection:'combos'})">🔗 Combos & Choreos</button>

      <div class="stat-label" style="font-size:9px">Lv.${d}</div>

  <div class="tabs">
    ${[['all','Alle'],['0','—'],['1','Lv.1'],['2','Lv.2'],['3','Lv.3'],['4','Lv.4'],['5','Lv.5']].map(([v,l])=>`
    <button class="tab ${moveTab===v?'active':''}" onclick="setState({moveTab:'${v}'})">${l}</button>`).join('')}

    const sessionsWithMove = state.sessions.filter(s=>s.moves?.some(mv=>mv.name.toLowerCase()===m.name.toLowerCase()));

      </div>

  }).join('')}
  <button class="fab" onclick="openNewMove()">${icon('plus',22)}</button>
</div>`;
}

// ─── MOVE DETAIL PAGE ────────────────────────────────────────────────────────
function renderMoveDetailPage() {
  const {id, type} = state.moveDetail;
  // Look up in real moves first, then in learning goals (for learn-sourced entries)
  let move = state.moves.find(m=>m.id===id || m.name===id);
  let isLearnOnly = false;
  if (!move) {
    // Try to build a synthetic move from a learning goal
    const goal = state.learning.find(g=>g.id===id || g.name===id);
    if (goal) {
      move = {id:goal.id, name:goal.name, difficulty:goal.mastery||0, learnedOn:null, bothSides:null, notes:goal.notes||'', _source:'learn'};
      isLearnOnly = true;
    }
  }
  if (!move) return `<div class="scroll"><div class="detail-header"><button class="btn-ghost" onclick="setState({moveDetail:null})">${icon('back')}</button><div class="page-title" style="font-size:22px">Move nicht gefunden</div></div></div>`;

  const sessionsWithMove = state.sessions.filter(s=>s.moves?.some(m=>m.name.toLowerCase()===move.name.toLowerCase())).sort((a,b)=>b.date.localeCompare(a.date));
  const allAttempts = sessionsWithMove.flatMap(s=>s.moves.filter(m=>m.name.toLowerCase()===move.name.toLowerCase()));
  // Derive bothSides from actual session data if not explicitly set on move
  const bothSides = move.bothSides !== null && move.bothSides !== undefined
    ? move.bothSides
    : allAttempts.some(m=>m.sides==='both');
  const totalAttL = allAttempts.reduce((a,m)=>a+(parseInt(m.attL)||0),0);
  const totalAttR = allAttempts.reduce((a,m)=>a+(parseInt(m.attR)||0),0);
  const lastSession = sessionsWithMove[0];
  const firstSession = sessionsWithMove[sessionsWithMove.length-1];
  const goal = state.learning.find(g=>g.name.toLowerCase()===move.name.toLowerCase());

  return `<div class="scroll">
  <div class="detail-header">
    <button class="btn-ghost" onclick="setState({moveDetail:null})">${icon('back')}</button>
    <div style="flex:1">
      <div class="page-title" style="font-size:22px">💛 ${move.name}</div>
      <div class="page-sub">Level ${move.difficulty||0} – ${levels[(move.difficulty||1)-1]||''}</div>
    </div>
    ${isLearnOnly && goal
      ? `<button class="btn-ghost" style="color:var(--red);padding:6px" onclick="deleteLearnGoalFromDetail('${goal.id}')">${icon('x',18)}</button>`
      : !isLearnOnly ? `
        <button class="btn-ghost" style="color:var(--purple);padding:6px" onclick="openEditMove('${move.id}')">${icon('edit',18)}</button>
        <button class="btn-ghost" style="color:var(--red);padding:6px" onclick="event.stopPropagation();deleteMove('${move.id}')">${icon('x',18)}</button>`
      : ''}
  </div>

  <!-- Stats -->
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <div class="move-detail-stat stat-card"><div class="move-detail-stat-val">${sessionsWithMove.length}</div><div class="move-detail-stat-lbl">Trainings</div></div>
    <div class="move-detail-stat stat-card"><div class="move-detail-stat-val">${totalAttL+totalAttR}</div><div class="move-detail-stat-lbl">Versuche</div></div>
    ${bothSides?`<div class="move-detail-stat stat-card"><div class="move-detail-stat-val">${totalAttL}</div><div class="move-detail-stat-lbl">Links</div></div>
    <div class="move-detail-stat stat-card"><div class="move-detail-stat-val">${totalAttR}</div><div class="move-detail-stat-lbl">Rechts</div></div>`:''}
  </div>

  <div class="card">
    <div class="section-tag">Details</div>
    ${move.learnedOn?`<div class="info-row"><span class="info-key">Erstmals gelernt</span><span class="info-val">${fmtDate(move.learnedOn)}</span></div>`:''}
    ${firstSession?`<div class="info-row"><span class="info-key">Erste Session</span><span class="info-val">${fmtDate(firstSession.date)}</span></div>`:''}
    ${lastSession?`<div class="info-row"><span class="info-key">Zuletzt trainiert</span><span class="info-val">${fmtDate(lastSession.date)}</span></div>`:''}
    ${bothSides!==null?`<div class="info-row"><span class="info-key">Beidseitig</span><span class="info-val">${bothSides?'Ja':'Nein'}</span></div>`:''}
    ${move.notes?`<div class="info-row"><span class="info-key">Notizen</span><span class="info-val">${move.notes}</span></div>`:''}
  </div>

  <!-- Mastery level -->
  ${!isLearnOnly?`<div class="card">
    <div class="section-tag">Beherrschung</div>
    ${masterySliderMoveDirect(move.difficulty, move.id, false)}
  </div>`:''}

  <!-- Learning goal / tutorials -->
  ${goal?`<div class="card">
    <div class="section-tag">Lernziel & Tutorials</div>
    ${goal.notes?`<div style="font-size:13px;color:var(--muted);margin-bottom:10px">${goal.notes}</div>`:''}
    ${(goal.resources||[]).length?goal.resources.map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:600;font-size:13px">${r.name}</div>
      ${r.url?`<a href="${r.url}" target="_blank" style="font-size:12px;color:var(--purple);text-decoration:none">🔗 Link öffnen</a>`:''}
      ${r.notes?`<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">${r.notes}</div>`:''}
    </div>`).join(''):`<div style="font-size:13px;color:var(--muted);font-style:italic">Keine Tutorials hinterlegt</div>`}
    <button class="btn btn-outline btn-sm" style="margin-top:10px;font-size:12px;width:100%" onclick="editLearnGoal('${goal.id}')">✏️ Lernziel bearbeiten</button>
  </div>`:''}

  <!-- Session history -->
  ${sessionsWithMove.length>0?`<div class="card">
    <div class="section-tag">Training-Verlauf</div>
    ${sessionsWithMove.map(s=>{
      const mv = s.moves.find(m=>m.name.toLowerCase()===move.name.toLowerCase());
      return `<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--muted)">${fmtDate(s.date)}</div>
        <div style="font-size:13px;font-weight:500">
          ${mv.sides==='both'?'Beidseitig':mv.sides==='left'?'Links':'Rechts'}
          ${mv.sides==='both'&&(mv.attL||mv.attR)?` · ${[mv.attL?mv.attL+'× L':'',mv.attR?mv.attR+'× R':''].filter(Boolean).join(' / ')}`:
            mv.sides!=='both'&&(mv.attL||mv.attR)?` · ${mv.attL||mv.attR}× Versuche`:''}
          ${mv.mastery?` · Level ${mv.mastery}`:''}
        </div>
        ${mv.notes?`<div style="font-size:11px;color:var(--muted);font-style:italic">${mv.notes}</div>`:''}
      </div>`;
    }).join('')}
    ${sessionsWithMove.length>5?`<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:6px">+ ${sessionsWithMove.length-5} weitere Trainings</div>`:''}
  </div>`:''}
</div>`;
}


// ─── COMBOS REPERTOIRE ──────────────────────────────────────────────────────
function renderCombosRepertoire() {
  // Merge state.combos + learning goals of type combo/choreo (no duplicates)
  const repCombos = (state.combos || []).map(c=>({...c, _source:'rep'}));
  const allItems = [...repCombos];
  state.learning.filter(g=>g.learnType==='combo'||g.learnType==='choreo').forEach(g => {
    const lower = g.name.toLowerCase();
    if (!allItems.find(c=>c.name.toLowerCase()===lower)) {
      allItems.push({
        id: g.id, name: g.name, type: g.learnType,
        songs: g.songs||[], notes: g.notes||'',
        learnedOn: null, mastery: g.mastery||0,
        _source: 'learn', _goalId: g.id
      });
    }
  });
  const combos = allItems;
  return `<div class="scroll">
  <div class="page-header">
    <div class="page-title">💛 Move-<span>Repertoire</span></div>
    <div class="page-sub">${state.moves.length} Moves · ${combos.length} Combos & Choreos</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="tab" style="flex:1" onclick="setState({movesSection:'moves'})">💛 Moves</button>
    <button class="tab active" style="flex:1" onclick="setState({movesSection:'combos'})">🔗 Combos & Choreos</button>
  </div>
  ${combos.length===0?`<div class="empty"><div class="empty-icon">🔗</div><div class="empty-title">Noch keine Combos</div><div>Gelernte Combos & Choreos hier sammeln!</div></div>`
  :combos.sort((a,b)=>a.name.localeCompare(b.name,'de')).map(c=>{
    const sessionsWithCombo = state.sessions.filter(s=>s.combos?.some(cb=>(cb.sequence||cb.choreoName||'').toLowerCase()===c.name.toLowerCase()));
    const lastTrained = sessionsWithCombo.length ? sessionsWithCombo.sort((a,b)=>b.date.localeCompare(a.date))[0].date : null;
    const songList = (c.songs||[]).filter(s=>s);
    const isLearnOnly = c._source === 'learn';
    const srcTag = isLearnOnly ? `<span style="font-size:9px;background:#fff7ed;color:var(--purple-d);border:1px solid var(--border);border-radius:4px;padding:1px 4px;margin-left:4px">Lernziel</span>` : '';
    const clickFn = isLearnOnly ? `openLearnDetail('${c._goalId}')` : `openComboDetailFull('${c.id}')`;
    return `<div class="card" style="margin-bottom:10px;cursor:pointer" onclick="${clickFn}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${c.type==='choreo'?'var(--pink)':'var(--purple)'}">${c.type==='choreo'?'💃 Choreo':'🔗 Combo'}</span>
            ${c.learnedOn?`<span style="font-size:11px;color:var(--muted)">${fmtDate(c.learnedOn)}</span>`:''}
            ${srcTag}
          </div>
          <div style="font-weight:700;font-size:15px;margin-bottom:2px">${c.name}</div>
          ${songList.length?`<div style="font-size:12px;color:var(--pink);margin-bottom:2px">🎵 ${songList.join(' · ')}</div>`:''}
          ${lastTrained?`<div style="font-size:11px;color:var(--muted)">Zuletzt: ${fmtDate(lastTrained)}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('')}
  <button class="fab" onclick="openNewComboRepertoire()">${icon('plus',22)}</button>
</div>`;
}

}

  render();
}

function renderMoveDetailFull() {
  const id = state.moveDetailFull;
  const move = state.moves.find(m=>m.id===id);
  if (!move) return `<div class="scroll"><div class="detail-header"><button class="btn-ghost" onclick="setState({moveDetailFull:null})">${icon('back')}</button><div class="page-title">Nicht gefunden</div></div></div>`;

  const nameLower = move.name.toLowerCase();
  const goal = state.learning.find(g=>g.name.toLowerCase()===nameLower);
  const sessionsWithMove = state.sessions.filter(s=>s.moves?.some(m=>m.name.toLowerCase()===nameLower)).sort((a,b)=>b.date.localeCompare(a.date));

  let totalAtt=0,totalSuc=0,totalAttL=0,totalAttR=0,totalSucL=0,totalSucR=0;
  const allNotes=[];
  sessionsWithMove.forEach(s=>{
    const m=s.moves.find(m=>m.name.toLowerCase()===nameLower);
    if(m){
      totalAttL+=parseInt(m.attL)||0; totalAttR+=parseInt(m.attR)||0;
      totalSucL+=parseInt(m.sucL)||0; totalSucR+=parseInt(m.sucR)||0;
      totalAtt+=(parseInt(m.attL)||0)+(parseInt(m.attR)||0);
      totalSuc+=(parseInt(m.sucL)||0)+(parseInt(m.sucR)||0);
      if(m.notes?.trim()) allNotes.push({date:s.date,text:m.notes.trim()});
    }
  });
  const successRate = totalAtt>0 ? Math.round((totalSuc/totalAtt)*100) : null;
  const lvlColor = move.difficulty>0 ? DIFF_COLORS[move.difficulty-1] : '#a07850';

  return `<div class="scroll">
  <div class="detail-header">
    <button class="btn-ghost" onclick="setState({moveDetailFull:null})">${icon('back')}</button>
    <div style="flex:1">
      <div class="page-title" style="font-size:20px">💛 ${move.name}</div>
      <div class="page-sub">Level ${move.difficulty||0} · ${levels[(move.difficulty||1)-1]||'—'}</div>
    </div>
    <button class="btn-ghost" style="color:var(--purple);padding:6px" onclick="openEditMove('${move.id}')">${icon('edit',18)}</button>
  </div>

  <div class="card" style="margin-bottom:10px">
    <div class="section-tag">Details</div>
    ${masterySliderMoveDirect(move.difficulty, move.id, false)}
    ${move.learnedOn?`<div style="font-size:12px;color:var(--muted);margin-top:8px">Gelernt am ${fmtDate(move.learnedOn)}</div>`:''}
    ${move.bothSides===true?`<div style="font-size:12px;color:var(--muted)">Beidseitig</div>`:''}
    ${move.notes?`<div style="font-size:13px;color:var(--muted);margin-top:6px;white-space:pre-line">${move.notes.replace(/</g,'&lt;')}</div>`:''}
  </div>

  ${sessionsWithMove.length>0?`<div style="display:flex;gap:8px;margin-bottom:10px">
    <div class="stat-card" style="flex:1;text-align:center"><div class="stat-val">${sessionsWithMove.length}</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card" style="flex:1;text-align:center"><div class="stat-val">${totalAtt}</div><div class="stat-label">Versuche</div></div>
    <div class="stat-card" style="flex:1;text-align:center"><div class="stat-val">${totalSuc}</div><div class="stat-label">Erfolge</div></div>
    ${successRate!==null?`<div class="stat-card" style="flex:1;text-align:center"><div class="stat-val" style="color:var(--green)">${successRate}%</div><div class="stat-label">Rate</div></div>`:''}
  </div>`:''}

  ${(totalAttL||totalAttR||totalSucL||totalSucR)?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Links / Rechts</div>
    <div style="display:flex;gap:8px">
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--purple)">${totalAttL}</div><div style="font-size:10px;color:var(--muted)">Versuche L</div></div>
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--purple)">${totalAttR}</div><div style="font-size:10px;color:var(--muted)">Versuche R</div></div>
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--green)">${totalSucL}</div><div style="font-size:10px;color:var(--muted)">Erfolge L</div></div>
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--green)">${totalSucR}</div><div style="font-size:10px;color:var(--muted)">Erfolge R</div></div>
    </div>
  </div>`:''}

  ${goal?(()=>{
    const res=(goal.resources||[]);
    const songs=(goal.songs||[]);
    return (res.length||songs.length)?`<div class="card" style="margin-bottom:10px">
      <div class="section-tag">Lernziel & Tutorials</div>
      ${songs.length?songs.map(s=>`<div style="font-size:13px;padding:4px 0;color:var(--pink)">🎵 ${s}</div>`).join(''):''}
      ${res.map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="font-weight:600;font-size:13px">${(r.name||'').replace(/</g,'&lt;')}</div>
        ${r.url?`<a href="${r.url}" target="_blank" style="font-size:12px;color:var(--purple);text-decoration:none">🔗 Link öffnen</a>`:''}
        ${r.notes?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">${r.notes.replace(/</g,'&lt;')}</div>`:''}
      </div>`).join('')}
    </div>`:''})():''}

  ${allNotes.length?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Notizen aus Einheiten</div>
    ${allNotes.map(n=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${fmtDate(n.date)}</div>
      <div style="font-size:13px;white-space:pre-line">${n.text.replace(/</g,'&lt;')}</div>
    </div>`).join('')}
  </div>`:''}

  ${sessionsWithMove.length>0?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Training-Verlauf</div>
    ${sessionsWithMove.map(s=>{
      const m=s.moves.find(m=>m.name.toLowerCase()===nameLower);
      if(!m) return '';
      const att=m.sides==='both'?[m.attL?m.attL+'×L':'',m.attR?m.attR+'×R':''].filter(Boolean).join('/'):(m.attL||m.attR||0)+'×';
      const suc=m.sides==='both'?[m.sucL?m.sucL+'✓L':'',m.sucR?m.sucR+'✓R':''].filter(Boolean).join('/'):(m.sucL||0)?m.sucL+'✓':'';
      const detail=[att&&att!=='0×'?att:'',suc].filter(Boolean).join(' · ');
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
        <span style="font-size:12px;color:var(--muted)">${fmtDate(s.date)}</span>
        ${detail?`<span style="font-size:12px">${detail}</span>`:''}
      </div>`;
    }).join('')}
    ${sessionsWithMove.length>10?`<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:6px">+ ${sessionsWithMove.length-10} weitere</div>`:''}
  </div>`:`<div class="card" style="margin-bottom:10px;text-align:center;padding:20px;color:var(--muted);font-size:13px">Noch keine Einheiten 🎯</div>`}
</div>`;
}

    </div>`).join('')}

  ${sessionsWithThis.length>0?`<div class="card" style="margin-bottom:10px">

function openComboDetail(id) {
  state.moveDetail = {id, type:'combo'};
  render();
}
function editComboRepertoire(id) {
  const c = (state.combos||[]).find(x=>x.id===id);
  if (!c) return;
  state.form = {...c, songs:[...(c.songs||[])], editComboId:id};
  state.sheet = 'comboRep';
  render();
}
function saveComboRepertoire() {
  const name = document.getElementById('cr-name')?.value || '';
  const notes = document.getElementById('cr-notes')?.value || '';
  const learnedOn = document.getElementById('cr-date')?.value || today();
  if (!name.trim()) return;
  const songs = (state.form.songs||[]).filter(s=>s.trim());
  const songEl = document.getElementById('cr-song-new');
  if (songEl && songEl.value.trim()) songs.push(songEl.value.trim());
  if (!state.combos) state.combos = [];
  if (state.form.editComboId) {
    state.combos = state.combos.map(c=>c.id===state.form.editComboId?{...c,name,songs,notes,learnedOn,mastery:state.form.mastery||c.mastery||0}:c);
  } else {
    state.combos.push({...state.form, id:uid(), name, songs, notes, learnedOn});
  }
  save(KEYS.combos, state.combos);
  state.sheet = null;
  render();
}

function openLearnDetail(id) {
  state.learnDetail = id;
  render();
}
function openLearnDetailFromMoves(id) {
  state.learnDetailFromMoves = id;
  render();
}

function renderLearnDetailPage(fromMoves=false) {
  const id = fromMoves ? state.learnDetailFromMoves : state.learnDetail;
  const backFn = fromMoves ? 'setState({learnDetailFromMoves:null})' : 'setState({learnDetail:null})';
  const g = state.learning.find(x=>x.id===id);
  if (!g) return `<div class="scroll"><div class="detail-header"><button class="btn-ghost" onclick="${backFn}">${icon('back')}</button><div class="page-title">Nicht gefunden</div></div></div>`;

  const nameLower = g.name.toLowerCase();
  const isChoreo = g.learnType==='choreo';
  const isCombo = g.learnType==='combo';

  const sessionsWithThis = (isCombo||isChoreo)
    ? state.sessions.filter(s=>s.combos?.some(c=>(c.sequence||c.choreoName||'').toLowerCase()===nameLower)).sort((a,b)=>b.date.localeCompare(a.date))
    : state.sessions.filter(s=>s.moves?.some(m=>m.name.toLowerCase()===nameLower)).sort((a,b)=>b.date.localeCompare(a.date));

  let totalAtt=0, totalSuc=0, totalAttL=0, totalAttR=0, totalSucL=0, totalSucR=0;
  const allNotes = [];
  sessionsWithThis.forEach(s => {
    if (isCombo||isChoreo) {
      const c = s.combos.find(c=>(c.sequence||c.choreoName||'').toLowerCase()===nameLower);
      if (c) { totalAtt += (parseInt(c.attL)||0)+(parseInt(c.attR)||0)+(parseInt(c.attTotal)||0); if (c.notes?.trim()) allNotes.push({date:s.date,text:c.notes.trim()}); }
    } else {
      const m = s.moves.find(m=>m.name.toLowerCase()===nameLower);
      if (m) {
        totalAttL+=parseInt(m.attL)||0; totalAttR+=parseInt(m.attR)||0;
        totalSucL+=parseInt(m.sucL)||0; totalSucR+=parseInt(m.sucR)||0;
        totalAtt+=(parseInt(m.attL)||0)+(parseInt(m.attR)||0);
        totalSuc+=(parseInt(m.sucL)||0)+(parseInt(m.sucR)||0);
        if (m.notes?.trim()) allNotes.push({date:s.date,text:m.notes.trim()});
      }
    }
  });
  const successRate = totalAtt>0 ? Math.round((totalSuc/totalAtt)*100) : null;
  const masteryLabel = isChoreo ? (MASTERY_LABELS_CHOREO[g.mastery||0]||'—') : (MASTERY_LABELS[g.mastery||0]||'—');

  return `<div class="scroll">
  <div class="detail-header">
    <button class="btn-ghost" onclick="${backFn}">${icon('back')}</button>
    <div style="flex:1">
      <div class="page-title" style="font-size:20px">${isChoreo?'💃':isCombo?'🔗':'💛'} ${g.name}</div>
      <div class="page-sub">${masteryLabel}</div>
    </div>
    <button class="btn-ghost" style="color:var(--purple);padding:6px" onclick="editLearnGoal('${g.id}')">${icon('edit',18)}</button>
  </div>

  <div class="card" style="margin-bottom:10px">
    <div class="section-tag">Beherrschung</div>
    ${masterySliderGoal(g.mastery||0, g.id, isChoreo)}
    ${g.notes?`<div style="font-size:13px;color:var(--muted);margin-top:8px;font-style:italic;white-space:pre-line">${g.notes.replace(/</g,'&lt;')}</div>`:''}
  </div>

  ${sessionsWithThis.length>0?`<div style="display:flex;gap:8px;margin-bottom:10px">
    <div class="stat-card" style="flex:1;text-align:center"><div class="stat-val">${sessionsWithThis.length}</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card" style="flex:1;text-align:center"><div class="stat-val">${totalAtt}</div><div class="stat-label">Versuche</div></div>
    ${!isCombo&&!isChoreo?`<div class="stat-card" style="flex:1;text-align:center"><div class="stat-val">${totalSuc}</div><div class="stat-label">Erfolge</div></div>
    ${successRate!==null?`<div class="stat-card" style="flex:1;text-align:center"><div class="stat-val" style="color:var(--green)">${successRate}%</div><div class="stat-label">Rate</div></div>`:''}`:''}
  </div>`:''}

  ${!isCombo&&!isChoreo&&(totalAttL||totalAttR||totalSucL||totalSucR)?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Links / Rechts</div>
    <div style="display:flex;gap:8px">
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--purple)">${totalAttL}</div><div style="font-size:10px;color:var(--muted)">Versuche L</div></div>
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--purple)">${totalAttR}</div><div style="font-size:10px;color:var(--muted)">Versuche R</div></div>
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--green)">${totalSucL}</div><div style="font-size:10px;color:var(--muted)">Erfolge L</div></div>
      <div style="flex:1;text-align:center;padding:8px;background:var(--card2);border-radius:8px"><div style="font-size:20px;font-weight:700;color:var(--green)">${totalSucR}</div><div style="font-size:10px;color:var(--muted)">Erfolge R</div></div>
    </div>
  </div>`:''}

  ${(g.resources||[]).length?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Tutorials & Links</div>
    ${g.resources.map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:600;font-size:13px">${(r.name||'').replace(/</g,'&lt;')}</div>
      ${r.url?`<a href="${r.url}" target="_blank" style="font-size:12px;color:var(--purple);text-decoration:none">🔗 Link öffnen</a>`:''}
      ${r.notes?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">${r.notes.replace(/</g,'&lt;')}</div>`:''}
    </div>`).join('')}
  </div>`:''}

  ${(g.songs||[]).length?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Songs</div>
    ${g.songs.map(s=>`<div style="font-size:13px;padding:4px 0;color:var(--pink)">🎵 ${s}</div>`).join('')}
  </div>`:''}

  ${allNotes.length?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Notizen aus Einheiten</div>
    ${allNotes.map(n=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${fmtDate(n.date)}</div>
      <div style="font-size:13px;white-space:pre-line">${n.text.replace(/</g,'&lt;')}</div>
    </div>`).join('')}
  </div>`:''}

  ${sessionsWithThis.length>0?`<div class="card" style="margin-bottom:10px">
    <div class="section-tag">Training-Verlauf</div>
    ${sessionsWithThis.map(s=>{
      let detail='';
      if (isCombo||isChoreo) {
        const c=s.combos.find(c=>(c.sequence||c.choreoName||'').toLowerCase()===nameLower);
        if(c) detail=[c.attTotal?c.attTotal+'× Versuche':'',c.song?'🎵 '+c.song:''].filter(Boolean).join(' · ');
      } else {
        const m=s.moves.find(m=>m.name.toLowerCase()===nameLower);
        if(m){
          const att=m.sides==='both'?[m.attL?m.attL+'×L':'',m.attR?m.attR+'×R':''].filter(Boolean).join('/'):(m.attL||m.attR||0)+'×';
          const suc=m.sides==='both'?[m.sucL?m.sucL+'✓L':'',m.sucR?m.sucR+'✓R':''].filter(Boolean).join('/'):(m.sucL||0)?m.sucL+'✓':'';
          detail=[att&&att!=='0×'?att+'Versuche':'',suc?suc+'Erfolge':'',m.mastery?'Lv.'+m.mastery:''].filter(Boolean).join(' · ');
        }
      }
      return `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--muted)">${fmtDate(s.date)}</span>
        ${detail?`<span style="font-size:12px">${detail}</span>`:''}
      </div>`;
    }).join('')}
    ${sessionsWithThis.length>10?`<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:6px">+ ${sessionsWithThis.length-10} weitere</div>`:''}
  </div>`:`<div class="card" style="margin-bottom:10px;text-align:center;padding:20px;color:var(--muted);font-size:13px">Noch keine Einheiten mit diesem ${isCombo?'Combo':isChoreo?'Choreo':'Move'} 🎯<br><br>Füge ihn in deiner nächsten Einheit hinzu!</div>`}
</div>`;
}

// ─── LEARN ───────────────────────────────────────────────────────────────────
function renderLearn() {
  const { learning, learnSearch, learnTypeFilter } = state;
  const q = (learnSearch||'').toLowerCase().trim();
  const tf = learnTypeFilter||'all';
  const filtered = learning.filter(g => {
    const matchesQ = !q || g.name.toLowerCase().includes(q) || (g.notes||'').toLowerCase().includes(q);
    const matchesType = tf==='all' || g.learnType===tf;
    return matchesQ && matchesType;
  });
  const active = filtered.filter(g=>(g.mastery||0)<5&&!g.regressed);
  const done = filtered.filter(g=>(g.mastery||0)>=5&&!g.regressed);
  const regressed = filtered.filter(g=>g.regressed);

  return `<div class="scroll">
  <div class="page-header">
    <div class="page-title">Lernen &amp; <span>Links</span></div>
    <div class="page-sub">${learning.filter(g=>(g.mastery||0)<5).length} in Arbeit · ${learning.filter(g=>(g.mastery||0)>=5).length} gemeistert</div>
  </div>
  <input id="learn-search-input" class="input" placeholder="🔍 Lernziel suchen..." value="${learnSearch||''}" oninput="setLearnSearch(this)" style="margin-bottom:10px">
  <div style="display:flex;gap:6px;margin-bottom:14px">
    ${[['all','Alle'],['move','💛 Moves'],['combo','🔗 Combos'],['choreo','💃 Choreos']].map(([v,l])=>`<button onclick="state.learnTypeFilter='${v}';render()" style="flex:1;padding:6px 4px;border-radius:20px;border:1px solid ${tf===v?'var(--purple-d)':'var(--border)'};background:${tf===v?'var(--purple-d)':'transparent'};color:${tf===v?'white':'var(--muted)'};font-size:11px;font-weight:600;cursor:pointer">${l}</button>`).join('')}
  </div>
  ${filtered.length===0&&learning.length>0?`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Nichts gefunden</div></div>`:
    learning.length===0?`<div class="empty"><div class="empty-icon">✨</div><div class="empty-title">Noch keine Lernziele</div><div>Welchen Move willst du als nächstes lernen?</div></div>`:''}

  ${active.length>0?active.map((g,gi)=>`<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="openLearnDetail('${g.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
      ${!q?`<div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">
        <button class="btn-ghost" style="padding:4px;color:var(--muted)" onclick="moveLearningGoal('${g.id}',-1)">▲</button>
        <button class="btn-ghost" style="padding:4px;color:var(--muted)" onclick="moveLearningGoal('${g.id}',1)">▼</button>
      </div>`:''}
      <div style="flex:1">
        <div style="font-weight:700;font-size:16px">${g.name}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${g.learnType==='choreo'?'💃 Choreo':g.learnType==='combo'?'🔗 Combo':'💛 Move'}</div>
      </div>
    </div>
    ${(g.songs||[]).length?`<div style="font-size:12px;color:var(--pink);margin-top:2px">🎵 ${(g.songs||[]).join(' · ')}</div>`:''}
    ${g.notes?`<div style="font-size:12px;color:var(--muted);margin:4px 0 8px">${g.notes}</div>`:'<div style="margin-bottom:6px"></div>'}
    <label class="form-label">Beherrschung</label>
    ${masterySliderGoal(g.mastery||0, g.id, g.learnType==='choreo')}
    ${(g.resources&&g.resources.length>0)?`<div style="margin-top:10px;margin-bottom:8px">
      ${g.resources.map(r=>{
        const safeName = (r.name||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const safeUrl = (r.url||'').replace(/"/g,'&quot;');
        const safeNotes = (r.notes||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const displayUrl = r.url ? (r.url.length>38 ? r.url.slice(0,38)+'…' : r.url) : '';
        return `<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-top:1px solid var(--border)">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${safeName}</div>
            ${r.url?`<a href="${safeUrl}" target="_blank" style="font-size:11px;color:var(--purple);text-decoration:none;word-break:break-all" onclick="event.stopPropagation()">🔗 ${displayUrl}</a>`:''}
            ${safeNotes?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">${safeNotes}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
  </div>`).join(''):''}

  ${done.length>0?`<div class="section-tag" style="margin:8px 0 10px">Gemeistert 🎉</div>
  ${done.map(g=>`<div class="card" style="margin-bottom:8px;opacity:.8;cursor:pointer" onclick="openLearnDetail('${g.id}')">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700;font-size:15px">✅ ${g.name}</div>
        ${g.resources?.length?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${g.resources.length} Tutorial${g.resources.length>1?'s':''}</div>`:''}
      </div>
      <button class="btn-ghost" style="color:var(--purple);padding:4px" onclick="event.stopPropagation();updateMasteryGoal('${g.id}',4)">↩️</button>
    </div>
  </div>`).join('')}`:''}

  ${regressed.length>0?`<div class="section-tag" style="margin:16px 0 10px;color:var(--red)">Wieder in Arbeit 🔄</div>
  ${regressed.map(g=>`<div class="card" style="margin-bottom:8px;border-color:var(--red)33;cursor:pointer" onclick="openLearnDetail('${g.id}')">
    <div style="flex:1">
      <div style="font-weight:700;font-size:15px;color:var(--red)">⬇️ ${g.name}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">Aktuell Level ${g.mastery||0} – ${MASTERY_LABELS[g.mastery||0]||'—'}</div>
    </div>
    <div style="margin-top:8px" onclick="event.stopPropagation()">
      <label class="form-label">Beherrschung anpassen</label>
      ${masterySliderGoal(g.mastery||0, g.id, g.learnType==='choreo')}
    </div>
  </div>`).join('')}`:''}

  <button class="fab" onclick="openNewLearnGoal()">${icon('plus',22)}</button>
</div>`;
}

function renderLearnGoalSheet() {

  <div class="form-group">

// ─── COMBO REP SHEET ─────────────────────────────────────────────────────────
function renderComboRepSheet() {
  const f = state.form;
  const isChoreo = f.type === 'choreo';
  const tokens = (f.name||'').split(/\s*→\s*/).filter(t=>t.trim());

  // Build blocks HTML using string concatenation to avoid nested template literal issues
  const blocksHtml = tokens.map((t,bi) =>
    '<div style="display:inline-flex;align-items:center;gap:4px;background:var(--purple-d);color:white;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600">'
    + t
    + '<span onclick="removeCrBlock('+bi+')" style="cursor:pointer;opacity:.7;font-size:16px;line-height:1">×</span>'

  ).join('');

  const nameField = isChoreo

    + '<div class="input input-sm" style="flex:1;display:flex;align-items:center">'+s+'</div>'
    + '<button class="btn-ghost" style="color:var(--red)" onclick="state.form.songs.splice('+i+',1);render()">'+icon('x',14)+'</button>'

  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button onclick="setFormField('type','combo');render()" style="flex:1;padding:8px;border-radius:8px;border:1px solid ${isChoreo?'var(--border)':'var(--purple-d)'};background:${isChoreo?'transparent':'var(--purple-d)'};color:${isChoreo?'var(--muted)':'white'};font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer">🔗 Combo</button>

function onLgSeqInput() {
  const inp = document.getElementById('lg-seq-input');
  if (!inp) return;
  const val = inp.value;
  const sugBox = document.getElementById('lg-sug');
  if (!sugBox) return;
  if (!val.trim()) { sugBox.innerHTML=''; return; }
  const lower = val.toLowerCase();
  const allNames = [...new Set([...state.moves.map(m=>m.name), ...state.learning.map(g=>g.name)])];
  const matches = allNames.filter(n=>n.toLowerCase().startsWith(lower)&&n.toLowerCase()!==lower).slice(0,6);
  if (!matches.length) { sugBox.innerHTML=''; return; }
  sugBox.innerHTML = matches.map(n=>`<div onmousedown="event.preventDefault();(function(){var el=document.getElementById('lg-seq-input');if(el)el.value='${n.replace(/'/g,"\\'")}';addLgBlock();})();" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)">+ ${n}</div>`).join('');
}
function addLgBlock() {
  const inp = document.getElementById('lg-seq-input');
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) return;
  const hiddenEl = document.getElementById('lg-name');
  const current = hiddenEl ? hiddenEl.value : (state.form.name||'');
  const tokens = current.split(/\s*→\s*/).filter(t=>t.trim());
  tokens.push(name);
  const newSeq = tokens.join(' → ');
  if (hiddenEl) hiddenEl.value = newSeq;
  state.form.name = newSeq;
  inp.value = '';
  autoAddToLearning(name);
  const blocksEl = document.getElementById('lg-blocks');
  if (blocksEl) {
    blocksEl.innerHTML = tokens.map((t,bi)=>'<div style="display:inline-flex;align-items:center;gap:4px;background:var(--purple-d);color:white;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:600">'+t+'<span onclick="removeLgBlock('+bi+')" style="cursor:pointer;opacity:.7;font-size:16px;line-height:1">×</span></div>'+(bi<tokens.length-1?'<span style="color:var(--gold);font-weight:700;align-self:center">→</span>':'')).join('');
  }
  document.getElementById('lg-sug')&&(document.getElementById('lg-sug').innerHTML='');
  inp.focus();
}
function removeLgBlock(bi) {
  const hiddenEl = document.getElementById('lg-name');
  const current = hiddenEl ? hiddenEl.value : (state.form.name||'');
  const tokens = current.split(/\s*→\s*/).filter(t=>t.trim());
  tokens.splice(bi,1);

// Auto-add a move name to learning goals only if explicitly requested
// (disabled auto-add on combo typing — too aggressive, clutters learn tab)
function autoAddToLearning(name) {
  if (!name || !name.trim()) return;
  const lower = name.trim().toLowerCase();
  // Skip if already in repertoire OR already in learning tab
  const inRepertoire = state.moves.find(m=>m.name.toLowerCase()===lower);
  const inLearning = state.learning.find(g=>g.name.toLowerCase()===lower);
  if (inRepertoire || inLearning) return;
  // Only add truly unknown moves as a learning goal
  state.learning.push({id:uid(), name:name.trim(), learnType:'move', mastery:0, songs:[], resources:[], notes:''});
  save(KEYS.learning, state.learning);
}
